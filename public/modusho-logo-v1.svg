<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- ModusHO Logo v1: Cerchio HO con "M" brush stroke sotto -->
  <!-- Concept: Il cerchio richiama HO Collection, la M sotto identifica ModusHO -->

  <!-- Cerchio brush stroke (richiamo diretto al simbolo HO) -->
  <circle cx="200" cy="170" r="95" fill="none" stroke="#141413" stroke-width="22" stroke-linecap="round"
    style="paint-order: stroke"/>

  <!-- Tratto brush sotto il cerchio — stilizzato come una "M" morbida -->
  <!-- Tre punti di contatto che formano una M con curve eleganti -->
  <path d="M 105 310
           Q 110 280, 135 310
           Q 160 345, 200 290
           Q 240 345, 265 310
           Q 290 280, 295 310"
        fill="none" stroke="#141413" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Testo ModusHO -->
  <text x="200" y="410" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif"
        font-size="42" letter-spacing="12" fill="#141413" font-weight="400">MODUSHO</text>

  <!-- Sottotitolo -->
  <text x="200" y="455" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="16" letter-spacing="6" fill="#141413" font-weight="300">GOVERNANCE OPERATIVA</text>
</svg>